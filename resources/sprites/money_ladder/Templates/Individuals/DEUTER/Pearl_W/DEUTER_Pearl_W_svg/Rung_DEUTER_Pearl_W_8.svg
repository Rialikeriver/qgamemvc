<svg width="398" height="68" viewBox="0 0 398 68" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradBaseDeuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#B3D9FF;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#E6F2FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80BFFF;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gradGoldWashDeuter" x1="20%" y1="100%" x2="80%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD600;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#FFE866;stop-opacity:0.85" />
      <stop offset="60%" style="stop-color:#FFD600;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFFACD;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="gradShineDeuter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.7" />
      <stop offset="40%" style="stop-color:#FFFFFF;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.2" />
    </linearGradient>

    <linearGradient id="gradBorderComplexDeuter" x1="0%" y1="0%" x2="100%" y2="100%">
       <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
       <stop offset="25%" style="stop-color:#005EBA;stop-opacity:1" />
       <stop offset="50%" style="stop-color:#FFD600;stop-opacity:1" />
       <stop offset="75%" style="stop-color:#80BFFF;stop-opacity:1" />
       <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>

    <filter id="complexGlowDeuter">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FFD600" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#005EBA" flood-opacity="0.3"/>
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#001133" flood-opacity="0.8"/>
    </filter>
  </defs>

  <g id="State_Hover_Deuter">
    <rect x="4" y="4" width="390" height="60" rx="10" ry="10" 
          fill="url(#gradBaseDeuter)" filter="url(#complexGlowDeuter)" />
          
    <rect x="4" y="4" width="390" height="60" rx="10" ry="10" 
          fill="url(#gradGoldWashDeuter)" />

    <rect x="4" y="4" width="390" height="60" rx="10" ry="10" 
          fill="url(#gradShineDeuter)" />

    <rect x="4" y="4" width="390" height="60" rx="10" ry="10" 
          fill="none" stroke="url(#gradBorderComplexDeuter)" stroke-width="3" />
    
    <text x="35" y="33" dominant-baseline="central" font-family="Arial, sans-serif" font-weight="900" font-size="30" fill="#FFFFFF" text-anchor="middle" stroke="#001133" stroke-width="0.8">
      8
    </text>

    <path d="M 74 25 L 82 35 L 74 46 L 66 35 Z" fill="#FFFFFF" stroke="#001133" stroke-width="0.5" />

    <text x="230" y="33" dominant-baseline="central" font-family="Arial, sans-serif" font-weight="900" font-size="34" fill="#FFFFFF" text-anchor="middle" letter-spacing="1" stroke="#001133" stroke-width="1">
      $8,000
    </text>
  </g>
</svg>