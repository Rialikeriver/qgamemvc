<svg width="398" height="68" viewBox="0 0 398 68" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F2FF;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#D8BFD8;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#B3D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gradGoldWash" x1="20%" y1="100%" x2="80%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#FFF8DC;stop-opacity:0.8" />
      <stop offset="60%" style="stop-color:#FFD700;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#FFFACD;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="gradShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.7" />
      <stop offset="40%" style="stop-color:#FFFFFF;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.2" />
    </linearGradient>

    <linearGradient id="gradBorderComplex" x1="0%" y1="0%" x2="100%" y2="100%">
       <stop offset="0%" style="stop-color:#FFFACD;stop-opacity:1" />
       <stop offset="25%" style="stop-color:#B3D9FF;stop-opacity:1" />
       <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
       <stop offset="75%" style="stop-color:#E6E6FA;stop-opacity:1" />
       <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>

    <filter id="complexGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FFD700" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#80BFFF" flood-opacity="0.4"/>
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000022" flood-opacity="0.7"/>
    </filter>
  </defs>

  <g id="State_Hover_Complex">
    <rect x="4" y="4" width="390" height="60" rx="10" ry="10" 
          fill="url(#gradBase)" filter="url(#complexGlow)" />
          
    <rect x="4" y="4" width="390" height="60" rx="10" ry="10" 
          fill="url(#gradGoldWash)" />

    <rect x="4" y="4" width="390" height="60" rx="10" ry="10" 
          fill="url(#gradShine)" />

    <rect x="4" y="4" width="390" height="60" rx="10" ry="10" 
          fill="none" stroke="url(#gradBorderComplex)" stroke-width="3" />
    
    <text x="35" y="33" dominant-baseline="central" font-family="Arial, sans-serif" font-weight="900" font-size="30" fill="#FFFFFF" text-anchor="middle" stroke="#000033" stroke-width="0.8">
      6
    </text>

    <path d="M 74 25 L 82 35 L 74 46 L 66 35 Z" fill="#FFFFFF" stroke="#000033" stroke-width="0.5" />

    <text x="230" y="33" dominant-baseline="central" font-family="Arial, sans-serif" font-weight="900" font-size="34" fill="#FFFFFF" text-anchor="middle" letter-spacing="1" stroke="#000033" stroke-width="1">
      $2,000
    </text>
  </g>
</svg>