<svg width="398" height="68" viewBox="0 0 398 68" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradBaseTritan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#CCFFFF;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#E6FFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gradRoseGoldWash" x1="20%" y1="100%" x2="80%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3377;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#FF99BB;stop-opacity:0.85" />
      <stop offset="60%" style="stop-color:#FF3377;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="gradShineTritan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.7" />
      <stop offset="40%" style="stop-color:#FFFFFF;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.2" />
    </linearGradient>

    <linearGradient id="gradBorderComplexTritan" x1="0%" y1="0%" x2="100%" y2="100%">
       <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
       <stop offset="25%" style="stop-color:#AA0044;stop-opacity:1" />
       <stop offset="50%" style="stop-color:#00AAAA;stop-opacity:1" />
       <stop offset="75%" style="stop-color:#FF99BB;stop-opacity:1" />
       <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>

    <filter id="complexGlowTritan">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FF3377" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#00AAAA" flood-opacity="0.3"/>
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#220011" flood-opacity="0.8"/>
    </filter>
  </defs>

  <g id="State_Hover_Tritan">
    <rect x="4" y="4" width="390" height="60" rx="10" ry="10" 
          fill="url(#gradBaseTritan)" filter="url(#complexGlowTritan)" />
          
    <rect x="4" y="4" width="390" height="60" rx="10" ry="10" 
          fill="url(#gradRoseGoldWash)" />

    <rect x="4" y="4" width="390" height="60" rx="10" ry="10" 
          fill="url(#gradShineTritan)" />

    <rect x="4" y="4" width="390" height="60" rx="10" ry="10" 
          fill="none" stroke="url(#gradBorderComplexTritan)" stroke-width="3" />
    
    <text x="35" y="33" dominant-baseline="central" font-family="Arial, sans-serif" font-weight="900" font-size="30" fill="#FFFFFF" text-anchor="middle" stroke="#220011" stroke-width="0.8">
      3
    </text>

    <path d="M 74 25 L 82 35 L 74 46 L 66 35 Z" fill="#FFFFFF" stroke="#220011" stroke-width="0.5" />

    <text x="230" y="33" dominant-baseline="central" font-family="Arial, sans-serif" font-weight="900" font-size="34" fill="#FFFFFF" text-anchor="middle" letter-spacing="1" stroke="#220011" stroke-width="1">
      $300
    </text>
  </g>
</svg>